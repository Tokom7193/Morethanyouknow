<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

</head>

<body class="welcome-page">

    <!-- Moon -->

    <div class="shooting-star s3" aria-hidden="true"></div>

    <!-- Clouds -->
    <div class="cloud c1" aria-hidden="true"></div>

    <!-- Welcome Card -->
    <main class="welcome-card">

        <h2>ACCESS GRANTED</h2>

        const insideBtn = document.getElementById("insideBtn");

        insideBtn.addEventListener("click", () => {

            setTimeout(() => {
